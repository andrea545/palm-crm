<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palm Sporting Club — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,'Times New Roman',serif;background:#E8E5DC;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid #D6D3C8;}
.logo{text-align:center;margin-bottom:32px;}
.logo img{width:140px;height:auto;}
.logo-text{font-size:18px;font-weight:600;color:#0D3D20;margin-top:12px;letter-spacing:-0.3px;}
.logo-sub{font-size:12px;color:#8C8A82;margin-top:4px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input{width:100%;padding:12px 14px;border:1px solid #D6D3C8;border-radius:10px;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAFAF8;transition:border-color 0.2s;}
.form-group input:focus{outline:none;border-color:#0D3D20;background:#fff;}
.login-btn{width:100%;padding:14px;background:#0D3D20;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background 0.2s;margin-top:8px;}
.login-btn:hover{background:#0a3019;}
.login-btn:disabled{background:#9CA3AF;cursor:not-allowed;}
.error{color:#DC2626;font-size:12px;margin-top:12px;text-align:center;font-family:-apple-system,sans-serif;display:none;}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#8C8A82;font-family:-apple-system,sans-serif;}
.footer a{color:#0D3D20;text-decoration:none;}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <img src="https://images.squarespace-cdn.com/content/v1/65d13efed52d4e7d3ecca2ad/5001e330-ad2f-4883-809e-a6149e75c82b/Untitled+design+%282%29.png?format=400w" alt="Palm Sporting Club" />
    <div class="logo-text">Palm Sporting Club</div>
    <div class="logo-sub">Business CRM · Marbella</div>
  </div>
  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
    </div>
    <button type="submit" class="login-btn" id="login-btn">Sign in</button>
    <div class="error" id="login-error"></div>
  </form>
  <div class="footer">
    <a href="https://www.palmsportingclub.com">palmsportingclub.com</a>
  </div>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('login-btn');
  var errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    var res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('psc_token', data.token);
    localStorage.setItem('psc_name', data.name);
    localStorage.setItem('psc_role', data.role);
    localStorage.setItem('psc_username', data.username);
    window.location.href = '/';
  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}
// If already logged in, redirect
if (localStorage.getItem('psc_token')) {
  window.location.href = '/';
}
</script>
</body>
</html>
